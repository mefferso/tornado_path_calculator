name: Run tornado crossing workflow

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date YYYY-MM-DD"
        required: true
        default: "2026-05-01"
      end_date:
        description: "End date YYYY-MM-DD"
        required: true
        default: "2026-05-02"
      bbox:
        description: "min_lon,min_lat,max_lon,max_lat"
        required: true
        default: "-91.8,28.5,-87.8,31.5"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Fetch parish/county boundaries
        run: python scripts/fetch_boundaries.py

      - name: Fetch DAT damage lines
        run: |
          python scripts/fetch_dat_tracks.py \
            --start "${{ github.event.inputs.start_date }}" \
            --end "${{ github.event.inputs.end_date }}" \
            --bbox "${{ github.event.inputs.bbox }}" \
            --output data/dat_damage_lines.geojson

      - name: Commit fetched data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*.geojson
          git commit -m "Fetch DAT tracks and boundaries" || echo "No changes to commit"
          git push
