name: Run Tornado Crossing Workflow

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date YYYY-MM-DD"
        required: true
        default: "2026-05-01"
      end_date:
        description: "End date YYYY-MM-DD"
        required: true
        default: "2026-05-02"
      bbox:
        description: "min_lon,min_lat,max_lon,max_lat"
        required: true
        default: "-91.8,28.5,-87.8,31.5"

permissions:
  contents: write

jobs:
  calculate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch parish/county boundaries
        run: python scripts/fetch_boundaries.py

      - name: Fetch DAT damage lines
        run: python scripts/fetch_dat_tracks.py --start "2026-05-01" --end "2026-05-02" --bbox "-91.8,28.5,-87.8,31.5" --output "data/dat_damage_lines.geojson"

      - name: Calculate crossing times
        run: python scripts/calculate_crossing_times.py --config config.json

      - name: Build interactive map data
        run: python scripts/build_map.py

      - name: Upload output CSV
        uses: actions/upload-artifact@v4
        with:
          name: tornado-crossing-times
          path: output/tornado_crossing_times.csv

      - name: Upload interactive map files
        uses: actions/upload-artifact@v4
        with:
          name: tornado-crossing-map
          path: docs/

      - name: Configure git user
        run: git config user.name github-actions

      - name: Configure git email
        run: git config user.email github-actions@github.com

      - name: Stage generated files
        run: git add data/*.geojson output/*.csv docs/

      - name: Commit generated files
        run: git commit -m "Update DAT tracks crossing times and map" || echo no-changes

      - name: Push generated files
        run: git push
