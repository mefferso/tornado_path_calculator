<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tornado Path Crossing Calculator</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQ3JpFhNf7Uq2aLXUhIgI88f5z+Ro4="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.92);
      --panel2: rgba(255, 255, 255, 0.95);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --border: rgba(148, 163, 184, 0.35);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
    }

    #app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      color: var(--text);
      background: linear-gradient(135deg, #111827, #0f172a 65%, #082f49);
      padding: 14px 18px;
      box-shadow: var(--shadow);
      z-index: 1000;
    }

    .topline {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.2px;
    }

    #summary {
      color: var(--muted);
      font-size: 13px;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    .legend {
      background: var(--panel2);
      color: #0f172a;
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: var(--shadow);
      line-height: 1.35;
      font-size: 13px;
      border: 1px solid rgba(15, 23, 42, 0.16);
    }

    .legend-title {
      font-weight: 800;
      margin-bottom: 6px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 4px 0;
    }

    .swatch {
      width: 22px;
      height: 4px;
      border-radius: 999px;
      display: inline-block;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 14px;
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      min-width: 320px;
      max-width: 520px;
    }

    .popup-title {
      font-size: 16px;
      font-weight: 850;
      margin-bottom: 7px;
      color: #0f172a;
    }

    .popup-subtitle {
      font-size: 12px;
      color: #475569;
      margin-bottom: 10px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 155px 1fr;
      gap: 4px 10px;
      font-size: 12.5px;
      margin-bottom: 10px;
    }

    .detail-key {
      color: #475569;
      font-weight: 700;
    }

    .detail-val {
      color: #111827;
      overflow-wrap: anywhere;
    }

    .crossing-block {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 8px 9px;
      margin: 8px 0;
      background: #f8fafc;
    }

    .crossing-title {
      font-weight: 850;
      font-size: 13px;
      margin-bottom: 5px;
      color: #0f172a;
    }

    .empty-note {
      color: #64748b;
      font-size: 12.5px;
      font-style: italic;
      border-top: 1px solid #e2e8f0;
      padding-top: 8px;
    }

    .crossing-marker {
      width: 12px;
      height: 12px;
      border: 2px solid white;
      border-radius: 50%;
      background: #111827;
      box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.35);
    }

    .error-box {
      position: absolute;
      top: 92px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
      background: #fee2e2;
      color: #7f1d1d;
      border: 1px solid #fecaca;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      max-width: 720px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="topline">
        <h1>Tornado Path Crossing Calculator</h1>
        <div id="summary">Loading tornado paths and crossing data…</div>
      </div>
    </header>
    <div id="map"></div>
  </div>

  <script>
    const TRACKS_URL = "data/dat_damage_lines.geojson";
    const CROSSINGS_URL = "data/tornado_crossing_times.csv";
    const TZ = "America/Chicago";

    const map = L.map("map", {
      preferCanvas: true,
      zoomControl: true
    }).setView([30.7, -90.0], 7);

    const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const topo = L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
      maxZoom: 17,
      attribution: "&copy; OpenTopoMap contributors"
    });

    const crossingsLayer = L.layerGroup().addTo(map);
    const pathLayer = L.geoJSON(null, {
      style: feature => trackStyle(feature),
      onEachFeature: (feature, layer) => {
        layer.on({
          mouseover: e => e.target.setStyle({ weight: 7, opacity: 1 }),
          mouseout: e => pathLayer.resetStyle(e.target),
          click: e => {
            const html = buildTrackPopup(feature);
            layer.bindPopup(html, { maxWidth: 560 }).openPopup(e.latlng);
          }
        });
      }
    }).addTo(map);

    L.control.layers(
      { "OpenStreetMap": osm, "Topo": topo },
      { "Tornado paths": pathLayer, "Boundary crossings": crossingsLayer },
      { collapsed: false }
    ).addTo(map);

    const crossingIcon = L.divIcon({
      className: "",
      html: "<div class='crossing-marker'></div>",
      iconSize: [16, 16],
      iconAnchor: [8, 8]
    });

    let crossingsByEvent = new Map();
    let allCrossings = [];

    function efColor(efscale) {
      const ef = String(efscale || "").toUpperCase().trim();
      return {
        "EF0": "#22c55e",
        "EF1": "#eab308",
        "EF2": "#f97316",
        "EF3": "#ef4444",
        "EF4": "#a855f7",
        "EF5": "#111827"
      }[ef] || "#2563eb";
    }

    function trackStyle(feature) {
      const p = feature.properties || {};
      return {
        color: efColor(p.efscale),
        weight: 5,
        opacity: 0.88,
        lineCap: "round",
        lineJoin: "round"
      };
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i + 1];

        if (c === '"') {
          if (inQuotes && next === '"') {
            value += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (c === "," && !inQuotes) {
          row.push(value);
          value = "";
        } else if ((c === "\n" || c === "\r") && !inQuotes) {
          if (c === "\r" && next === "\n") i++;
          row.push(value);
          if (row.some(v => v.trim() !== "")) rows.push(row);
          row = [];
          value = "";
        } else {
          value += c;
        }
      }

      row.push(value);
      if (row.some(v => v.trim() !== "")) rows.push(row);
      if (!rows.length) return [];

      const headers = rows[0].map(h => h.trim());
      return rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, idx) => obj[h] = (r[idx] ?? "").trim());
        return obj;
      });
    }

    function groupCrossings(rows) {
      const grouped = new Map();
      rows.forEach(row => {
        const id = row.event_id || "UNKNOWN";
        if (!grouped.has(id)) grouped.set(id, []);
        grouped.get(id).push(row);
      });

      grouped.forEach(list => {
        list.sort((a, b) => parseFloat(a.crossing_distance_miles || 0) - parseFloat(b.crossing_distance_miles || 0));
      });

      return grouped;
    }

    function formatEpochMs(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return clean(value);
      const d = new Date(n);
      return new Intl.DateTimeFormat("en-US", {
        timeZone: TZ,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit",
        timeZoneName: "short"
      }).format(d);
    }

    function durationMinutes(start, end) {
      const s = Number(start);
      const e = Number(end);
      if (!Number.isFinite(s) || !Number.isFinite(e) || e <= s) return "";
      return ((e - s) / 60000).toFixed(2);
    }

    function avgSpeed(lengthMiles, durationMins) {
      const len = Number(lengthMiles);
      const dur = Number(durationMins);
      if (!Number.isFinite(len) || !Number.isFinite(dur) || dur <= 0) return "";
      return (len / (dur / 60)).toFixed(1);
    }

    function clean(value) {
      if (value === null || value === undefined || value === "") return "—";
      return String(value);
    }

    function firstNonBlank(...values) {
      for (const v of values) {
        if (v !== null && v !== undefined && String(v).trim() !== "") return v;
      }
      return "";
    }

    function detailRow(key, value) {
      return `<div class="detail-key">${key}</div><div class="detail-val">${clean(value)}</div>`;
    }

    function buildTrackPopup(feature) {
      const p = feature.properties || {};
      const eventId = clean(p.event_id || p.objectid || feature.id);
      const rows = crossingsByEvent.get(eventId) || [];
      const first = rows[0] || {};
      const dur = firstNonBlank(first.duration_minutes, durationMinutes(p.starttime, p.endtime));
      const measuredMiles = firstNonBlank(first.measured_track_miles, p.length);
      const speed = firstNonBlank(first.avg_speed_mph, avgSpeed(measuredMiles, dur));

      let html = `<div class="popup-title">${eventId}</div>`;
      html += `<div class="popup-subtitle">Click/hover paths. Crossing markers show parish/county crossing points.</div>`;
      html += `<div class="detail-grid">`;
      html += detailRow("event_id", eventId);
      html += detailRow("stormdate", firstNonBlank(first.stormdate, formatEpochMs(p.stormdate)));
      html += detailRow("efscale", firstNonBlank(first.efscale, p.efscale));
      html += detailRow("start_time", firstNonBlank(first.start_time, formatEpochMs(p.starttime)));
      html += detailRow("end_time", firstNonBlank(first.end_time, formatEpochMs(p.endtime)));
      html += detailRow("duration_minutes", dur);
      html += detailRow("measured_track_miles", measuredMiles);
      html += detailRow("avg_speed_mph", speed);
      html += `</div>`;

      if (!rows.length) {
        html += `<div class="empty-note">No parish/county crossings were found for this tornado path.</div>`;
        return html;
      }

      rows.forEach((r, idx) => {
        html += `<div class="crossing-block">`;
        html += `<div class="crossing-title">Crossing ${idx + 1}</div>`;
        html += `<div class="detail-grid">`;
        html += detailRow("crossing_distance_miles", r.crossing_distance_miles);
        html += detailRow("crossing_time", r.crossing_time);
        html += detailRow("boundary_from", r.boundary_from);
        html += detailRow("boundary_to", r.boundary_to);
        html += detailRow("crossing_lon", r.crossing_lon);
        html += detailRow("crossing_lat", r.crossing_lat);
        html += `</div></div>`;
      });

      return html;
    }

    function addCrossingMarkers(rows) {
      crossingsLayer.clearLayers();
      rows.forEach(row => {
        const lat = parseFloat(row.crossing_lat);
        const lon = parseFloat(row.crossing_lon);
        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return;

        const marker = L.marker([lat, lon], { icon: crossingIcon }).bindPopup(`
          <div class="popup-title">${clean(row.event_id)}</div>
          <div class="crossing-block">
            <div class="crossing-title">Boundary Crossing</div>
            <div class="detail-grid">
              ${detailRow("crossing_distance_miles", row.crossing_distance_miles)}
              ${detailRow("crossing_time", row.crossing_time)}
              ${detailRow("boundary_from", row.boundary_from)}
              ${detailRow("boundary_to", row.boundary_to)}
              ${detailRow("crossing_lon", row.crossing_lon)}
              ${detailRow("crossing_lat", row.crossing_lat)}
            </div>
          </div>
        `, { maxWidth: 480 });

        crossingsLayer.addLayer(marker);
      });
    }

    function addLegend() {
      const legend = L.control({ position: "bottomright" });
      legend.onAdd = () => {
        const div = L.DomUtil.create("div", "legend");
        const rows = ["EF0", "EF1", "EF2", "EF3", "EF4", "EF5", "Unknown"];
        div.innerHTML = `<div class="legend-title">Path color</div>` + rows.map(label => {
          const color = label === "Unknown" ? efColor("") : efColor(label);
          return `<div class="legend-row"><span class="swatch" style="background:${color}"></span>${label}</div>`;
        }).join("") + `<div class="legend-row"><span class="crossing-marker" style="display:inline-block"></span> Crossing</div>`;
        return div;
      };
      legend.addTo(map);
    }

    function showError(message) {
      const box = document.createElement("div");
      box.className = "error-box";
      box.textContent = message;
      document.body.appendChild(box);
      document.getElementById("summary").textContent = "Map failed to load.";
    }

    async function init() {
      try {
        const [tracksResponse, crossingsResponse] = await Promise.all([
          fetch(TRACKS_URL, { cache: "no-store" }),
          fetch(CROSSINGS_URL, { cache: "no-store" })
        ]);

        if (!tracksResponse.ok) throw new Error(`Could not load ${TRACKS_URL}`);
        if (!crossingsResponse.ok) throw new Error(`Could not load ${CROSSINGS_URL}`);

        const tracks = await tracksResponse.json();
        const csvText = await crossingsResponse.text();
        allCrossings = parseCsv(csvText);
        crossingsByEvent = groupCrossings(allCrossings);

        pathLayer.addData(tracks);
        addCrossingMarkers(allCrossings);
        addLegend();

        const bounds = pathLayer.getBounds();
        if (bounds.isValid()) map.fitBounds(bounds.pad(0.18));

        const pathCount = tracks.features ? tracks.features.length : 0;
        const crossingCount = allCrossings.length;
        document.getElementById("summary").textContent = `${pathCount} tornado path(s), ${crossingCount} parish/county crossing record(s)`;
      } catch (err) {
        console.error(err);
        showError(err.message || String(err));
      }
    }

    init();
  </script>
</body>
</html>
